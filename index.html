<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletín Noticias - Leroy Merlin</title>
    <!-- Importamos Tailwind CSS para el diseño profesional y responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lm-green': '#6cc24a',
                        'lm-dark': '#5aa33e',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Efecto al pasar el ratón por encima de la noticia */
        .tarjeta-noticia {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tarjeta-noticia:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.15);
        }
        .contenedor-imagen {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background-color: #e2e8f0;
        }
        .contenedor-imagen img, .contenedor-imagen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        audio {
            width: 100%;
            height: 45px;
            border-radius: 8px;
            outline: none;
        }
        .line-clamp-4 {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Estilos extra para embellecer los selectores nativos */
        .filtro-estilizado {
            background-color: transparent;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        .filtro-estilizado::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-12">

    <!-- CABECERA PRINCIPAL FIJA -->
    <header class="bg-white/95 backdrop-blur-md border-b-4 border-lm-green sticky top-0 z-50 shadow-sm px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Boletín Noticias</h1>
                <p class="text-sm text-gray-500 font-medium">Leroy Merlin</p>
            </div>
            
            <!-- CONTROLES DE FILTRADO -->
            <div class="flex flex-wrap justify-center gap-3">
                <div class="relative">
                    <select id="filtro-categoria" class="border border-lm-green text-lm-dark font-semibold px-5 py-1.5 rounded-full text-sm hover:bg-green-50 transition-colors focus:outline-none filtro-estilizado pr-8">
                        <option value="">Todas las categorías</option>
                        <!-- Las opciones se inyectan por JS -->
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-lm-dark">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>

                <input type="date" id="filtro-fecha" class="border border-lm-green text-lm-dark font-semibold px-5 py-1.5 rounded-full text-sm hover:bg-green-50 transition-colors focus:outline-none filtro-estilizado" title="Filtrar por fecha">
                
                <button id="btn-limpiar" class="hidden border border-gray-300 text-gray-500 font-semibold px-4 py-1.5 rounded-full text-sm hover:bg-gray-100 transition-colors focus:outline-none">
                    Limpiar x
                </button>
            </div>
        </div>
    </header>

    <!-- AQUÍ APARECERÁN LAS NOTICIAS -->
    <main id="contenedor-boletines" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    </main>

    <!-- ========================================================================= -->
    <!-- ZONA DE DATOS (AQUÍ ES DONDE ACTUALIZAS CADA SEMANA)                      -->
    <!-- ========================================================================= -->
    <script>
        // CARPETA BASE PARA TUS FOTOS Y VÍDEOS
        const CARPETA_ASSETS = "./archivos/";

        const EDICIONES_DEL_BOLETIN = [
            
            // ==========================================
            // EDICIÓN DE ESTA SEMANA
            // ==========================================
            {
                tituloAudio: "Resumen de noticias de esta semana",
                audioSrc: "audio27F.mp3", // Sube un archivo llamado audio27F.mp3 a la carpeta "archivos"
                noticias: [
                    {
                        categoria: "Modelos Fundacionales",
                        fechaISO: "2026-02-27",
                        fechaTexto: "27 Feb 2026",
                        titulo: "La Consolidación de DeepSeek-V3.2 y el Paradigma del 'Test-Time Compute'",
                        resumen: "DeepSeek democratiza el cálculo en tiempo de inferencia con el lanzamiento del modelo V3.2. Esta versión reduce drásticamente los costes, iguala el rendimiento de modelos premium e introduce la capacidad autónoma 'Thinking in Tool-Use'.",
                        imagen: "1noticia27F", // Solo el nombre. Buscará ./archivos/1noticia27F.jpg
                        enlace: "https://api-docs.deepseek.com/news/news251201" 
                    },
                    {
                        categoria: "Generación de Vídeo",
                        fechaISO: "2026-02-27",
                        fechaTexto: "27 Feb 2026",
                        titulo: "OpenAI Lanza Sora 2 y choca con la 'EU AI Act'",
                        resumen: "OpenAI presenta Sora 2, un simulador de mundos físicos con nuevas capacidades como la continuación infinita de vídeos y la animación de imágenes reales. Sin embargo, la herramienta no está disponible en España debido a las regulaciones de la EU AI Act.",
                        imagen: "2noticia27F", // Si prefieres poner un vídeo, cambia "imagen" por "video: '2noticia27F.mp4'"
                        enlace: "https://openai.com/index/sora-2/" 
                    },
                    {
                        categoria: "Síntesis de Información",
                        fechaISO: "2026-02-27",
                        fechaTexto: "27 Feb 2026",
                        titulo: "NotebookLM redefine la asimilación de conocimiento mediante 'Audio Overviews' Globales",
                        resumen: "Google Labs actualiza NotebookLM añadiendo soporte para más de 50 idiomas en su función de resúmenes 'Audio Overviews'. Esto permite procesar documentaciones complejas en distintos idiomas y generar un debate o podcast explicativo en español.",
                        imagen: "3noticia27F", 
                        enlace: "https://blog.google/innovation-and-ai/products/notebooklm-audio-overviews/" 
                    }
                ]
            }
            // Cuando quieras añadir la semana que viene, pones una coma arriba y pegas un bloque nuevo aquí.
        ];

        // =========================================================================
        // MOTOR DE RENDERIZADO Y FILTRADO (NO TOCAR)
        // =========================================================================
        const contenedor = document.getElementById('contenedor-boletines');
        const selectCategoria = document.getElementById('filtro-categoria');
        const inputFecha = document.getElementById('filtro-fecha');
        const btnLimpiar = document.getElementById('btn-limpiar');

        function inicializarCategorias() {
            const todasLasCategorias = EDICIONES_DEL_BOLETIN.flatMap(edicion => 
                edicion.noticias.map(noticia => noticia.categoria)
            );
            const categoriasUnicas = [...new Set(todasLasCategorias)].sort();
            
            categoriasUnicas.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                selectCategoria.appendChild(option);
            });
        }

        function renderizarNoticias() {
            const categoriaSeleccionada = selectCategoria.value;
            const fechaSeleccionada = inputFecha.value;
            let htmlFinal = '';
            let edicionesVisibles = 0;

            EDICIONES_DEL_BOLETIN.forEach((edicion) => {
                const noticiasFiltradas = edicion.noticias.filter(noticia => {
                    const cumpleCategoria = categoriaSeleccionada === "" || noticia.categoria === categoriaSeleccionada;
                    const cumpleFecha = fechaSeleccionada === "" || noticia.fechaISO === fechaSeleccionada;
                    return cumpleCategoria && cumpleFecha;
                });

                if (noticiasFiltradas.length === 0) return;

                const esLaMasNueva = edicionesVisibles === 0;
                const opacidad = esLaMasNueva ? '' : 'opacity-80';

                if (!esLaMasNueva && edicionesVisibles > 0) {
                    htmlFinal += `
                    <div class="flex items-center justify-center mt-20 mb-14">
                        <div class="h-[1px] bg-lm-green w-full rounded-full opacity-50"></div>
                        <span class="px-5 text-lm-dark text-sm font-bold uppercase tracking-widest whitespace-nowrap bg-[#f4f6f8]">
                            Noticias Anteriores
                        </span>
                        <div class="h-[1px] bg-lm-green w-full rounded-full opacity-50"></div>
                    </div>`;
                }

                let tarjetasNoticias = '';
                noticiasFiltradas.forEach(noticia => {
                    let htmlMultimedia = '';
                    
                    if (noticia.video) {
                        const rutaVideo = noticia.video.startsWith('http') ? noticia.video : CARPETA_ASSETS + noticia.video;
                        htmlMultimedia = `
                        <video controls preload="metadata" class="w-full h-full object-cover">
                            <source src="${rutaVideo}" type="video/mp4">
                            Tu navegador no soporta vídeos.
                        </video>`;
                    } else {
                        let imagenSrc = noticia.imagen && noticia.imagen.trim() !== "" 
                            ? noticia.imagen 
                            : 'https://placehold.co/600x400/e2e8f0/64748b?text=Leroy+Merlin';
                            
                        if (!imagenSrc.startsWith('http') && !imagenSrc.includes('.')) {
                            imagenSrc = CARPETA_ASSETS + imagenSrc + '.jpg';
                        }

                        htmlMultimedia = `<img src="${imagenSrc}" alt="${noticia.titulo}" loading="lazy" decoding="async" onerror="this.onerror=null; this.src='https://placehold.co/600x400/e2e8f0/64748b?text=Subiendo+Imagen...'">`;
                    }

                    tarjetasNoticias += `
                    <article class="tarjeta-noticia bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                        <div class="contenedor-imagen ${esLaMasNueva ? '' : 'opacity-90'} relative">
                            ${htmlMultimedia}
                            <span class="absolute top-3 left-3 bg-white/90 text-lm-dark text-xs font-bold px-2.5 py-1 rounded shadow uppercase tracking-wide">
                                ${noticia.categoria}
                            </span>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-end mb-3">
                                <span class="text-gray-400 text-xs font-semibold flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${noticia.fechaTexto}
                                </span>
                            </div>
                            <h3 class="font-bold text-xl mb-3 leading-snug text-gray-900 line-clamp-2">${noticia.titulo}</h3>
                            <p class="text-gray-600 text-sm mb-6 flex-grow line-clamp-4 leading-relaxed">${noticia.resumen}</p>
                            
                            <a href="${noticia.enlace}" target="_blank" class="text-sm font-bold text-lm-dark hover:text-lm-green transition-colors mt-auto inline-flex items-center group">
                                Leer noticia completa 
                                <span class="ml-1.5 group-hover:translate-x-1 transition-transform">→</span>
                            </a>
                        </div>
                    </article>`;
                });

                htmlFinal += `
                <section class="mb-16 ${opacidad} transition-all duration-300">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8 w-full max-w-4xl mx-auto flex flex-col items-center">
                        <h2 class="text-center font-bold ${esLaMasNueva ? 'text-xl text-lm-dark' : 'text-lg text-gray-500'} mb-4">${edicion.tituloAudio}</h2>
                        <audio controls class="w-full max-w-2xl audio-boletin bg-gray-50 rounded-lg shadow-inner">
                            <source src="${CARPETA_ASSETS}${edicion.audioSrc}" type="audio/mpeg">
                            Tu navegador no soporta el audio.
                        </audio>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${tarjetasNoticias}
                    </div>
                </section>`;

                edicionesVisibles++;
            });

            if (edicionesVisibles === 0) {
                htmlFinal = `
                <div class="text-center py-20">
                    <p class="text-gray-500 text-lg mb-4">No hay noticias que coincidan con los filtros seleccionados.</p>
                </div>`;
            }

            contenedor.innerHTML = htmlFinal;

            if (categoriaSeleccionada || fechaSeleccionada) {
                btnLimpiar.classList.remove('hidden');
            } else {
                btnLimpiar.classList.add('hidden');
            }
        }

        selectCategoria.addEventListener('change', renderizarNoticias);
        inputFecha.addEventListener('change', renderizarNoticias);
        
        btnLimpiar.addEventListener('click', () => {
            selectCategoria.value = '';
            inputFecha.value = '';
            renderizarNoticias();
        });

        document.addEventListener('play', function(e){
            var audios = document.getElementsByTagName('audio');
            for(var i = 0, len = audios.length; i < len;i++){
                if(audios[i] != e.target){
                    audios[i].pause();
                }
            }
        }, true);

        inicializarCategorias();
        renderizarNoticias();
    </script>
</body>
</html>
