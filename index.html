<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletín Noticias - Leroy Merlin</title>
    <!-- Importamos Tailwind CSS para el diseño profesional y responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lm-green': '#6cc24a',
                        'lm-dark': '#5aa33e',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Efecto al pasar el ratón por encima de la noticia */
        .tarjeta-noticia {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tarjeta-noticia:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.15);
        }
        .contenedor-imagen {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background-color: #e2e8f0;
        }
        .contenedor-imagen img, .contenedor-imagen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        audio {
            width: 100%;
            height: 45px;
            border-radius: 8px;
            outline: none;
        }
        .line-clamp-4 {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Estilos extra para embellecer los selectores nativos */
        .filtro-estilizado {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        /* Arreglo específico para que el input de fecha no se colapse en iOS/Safari */
        input[type="date"] {
            min-width: 140px;
            justify-content: center;
        }
        /* Fix adicional para iOS para mostrar placeholder o forzar altura */
        input[type="date"]::-webkit-datetime-edit {
            padding: 2px 0;
        }
        .filtro-estilizado::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-12">

    <!-- CABECERA PRINCIPAL FIJA -->
    <header class="bg-white/95 backdrop-blur-md border-b-4 border-lm-green sticky top-0 z-50 shadow-sm px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Boletín Noticias</h1>
                <p class="text-sm text-gray-500 font-medium">Leroy Merlin</p>
            </div>
            
            <!-- CONTROLES DE FILTRADO -->
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="relative">
                    <!-- Corrección: Se cambió bg-transparent por bg-white para evitar bugs visuales en móviles -->
                    <select id="filtro-categoria" class="border border-lm-green text-lm-dark font-semibold px-5 py-1.5 rounded-full text-sm hover:bg-green-50 transition-colors focus:outline-none filtro-estilizado pr-8 bg-white">
                        <option value="">Todas las categorías</option>
                        <!-- Las opciones se inyectan por JS -->
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-lm-dark">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>

                <!-- Corrección: bg-white en lugar de bg-transparent para el input vacío en iOS -->
                <input type="date" id="filtro-fecha" class="border border-lm-green text-lm-dark font-semibold px-4 py-1.5 rounded-full text-sm hover:bg-green-50 transition-colors focus:outline-none bg-white text-center flex items-center" title="Filtrar por fecha">
                
                <button id="btn-limpiar" class="hidden border border-gray-300 text-gray-500 font-semibold px-4 py-1.5 rounded-full text-sm hover:bg-gray-100 transition-colors focus:outline-none">
                    Limpiar x
                </button>
            </div>
        </div>
    </header>

    <!-- AQUÍ APARECERÁN LAS NOTICIAS -->
    <main id="contenedor-boletines" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    </main>

    <!-- ========================================================================= -->
    <!-- ZONA DE DATOS (AQUÍ ES DONDE ACTUALIZAS CADA SEMANA)                      -->
    <!-- ========================================================================= -->
    <script>
        // CARPETA BASE PARA TUS FOTOS Y VÍDEOS
        const CARPETA_ASSETS = "./archivos/";

        const EDICIONES_DEL_BOLETIN = [
            // ==========================================
            // EDICIÓN DE ESTA SEMANA
            // ==========================================
            {
                tituloAudio: "Resumen de noticias de esta semana",
                audioSrc: "audio27F.mp3", 
                noticias: [
                    {
                        categoria: "Modelos Fundacionales",
                        fechaISO: "2026-02-27",
                        fechaTexto: "27 Feb 2026",
                        titulo: "La Consolidación de DeepSeek-V3.2 y el Paradigma del 'Test-Time Compute'",
                        resumen: "DeepSeek democratiza el cálculo en tiempo de inferencia con el revolucionario lanzamiento del modelo V3.2. Esta nueva versión no solo reduce drásticamente los costes operativos, sino que iguala el rendimiento de los modelos premium más avanzados del mercado e introduce la innovadora capacidad autónoma 'Thinking in Tool-Use'.",
                        imagen: "1noticia27F", 
                        enlace: "https://api-docs.deepseek.com/news/news251201" 
                    },
                    {
                        categoria: "Generación de Vídeo",
                        fechaISO: "2026-02-27",
                        fechaTexto: "27 Feb 2026",
                        titulo: "OpenAI Lanza Sora 2 y choca con la 'EU AI Act'",
                        resumen: "OpenAI presenta oficialmente Sora 2, un avanzado simulador de mundos físicos equipado con capacidades sin precedentes, como la continuación infinita de vídeos y la animación hiperrealista de imágenes. Sin embargo, esta potente herramienta tecnológica no estará disponible en España ni en el resto de Europa.",
                        imagen: "2noticia27F", 
                        enlace: "https://openai.com/index/sora-2/" 
                    },
                    {
                        categoria: "Síntesis de Información",
                        fechaISO: "2026-02-27",
                        fechaTexto: "27 Feb 2026",
                        titulo: "NotebookLM redefine la asimilación mediante 'Audio Overviews'",
                        resumen: "Google Labs da un salto gigantesco actualizando NotebookLM, añadiendo soporte nativo para más de 50 idiomas en su popular función de resúmenes.",
                        imagen: "3noticia27F", 
                        enlace: "https://blog.google/innovation-and-ai/products/notebooklm-audio-overviews/" 
                    }
                ]
            }
        ];

        // =========================================================================
        // MOTOR DE RENDERIZADO Y FILTRADO (NO TOCAR)
        // =========================================================================
        const contenedor = document.getElementById('contenedor-boletines');
        const selectCategoria = document.getElementById('filtro-categoria');
        const inputFecha = document.getElementById('filtro-fecha');
        const btnLimpiar = document.getElementById('btn-limpiar');

        function inicializarCategorias() {
            const todasLasCategorias = EDICIONES_DEL_BOLETIN.flatMap(edicion => 
                edicion.noticias.map(noticia => noticia.categoria)
            );
            const categoriasUnicas = [...new Set(todasLasCategorias)].sort();
            
            categoriasUnicas.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                selectCategoria.appendChild(option);
            });
        }

        function renderizarNoticias() {
            const categoriaSeleccionada = selectCategoria.value;
            const fechaSeleccionada = inputFecha.value;
            let htmlFinal = '';
            let edicionesVisibles = 0;

            EDICIONES_DEL_BOLETIN.forEach((edicion) => {
                const noticiasFiltradas = edicion.noticias.filter(noticia => {
                    const cumpleCategoria = categoriaSeleccionada === "" || noticia.categoria === categoriaSeleccionada;
                    const cumpleFecha = fechaSeleccionada === "" || noticia.fechaISO === fechaSeleccionada;
                    return cumpleCategoria && cumpleFecha;
                });

                if (noticiasFiltradas.length === 0) return;

                const esLaMasNueva = edicionesVisibles === 0;
                const opacidad = esLaMasNueva ? '' : 'opacity-80';

                if (!esLaMasNueva && edicionesVisibles > 0) {
                    htmlFinal += `
                    <div class="flex items-center justify-center mt-20 mb-14">
                        <div class="h-[1px] bg-lm-green w-full rounded-full opacity-50"></div>
                        <span class="px-5 text-lm-dark text-sm font-bold uppercase tracking-widest whitespace-nowrap bg-[#f4f6f8]">
                            Noticias Anteriores
                        </span>
                        <div class="h-[1px] bg-lm-green w-full rounded-full opacity-50"></div>
                    </div>`;
                }

                let tarjetasNoticias = '';
                noticiasFiltradas.forEach(noticia => {
                    let htmlMultimedia = '';
                    
                    if (noticia.video) {
                        const rutaVideo = noticia.video.startsWith('http') ? noticia.video : CARPETA_ASSETS + noticia.video;
                        htmlMultimedia = `
                        <video controls preload="metadata" class="w-full h-full object-cover">
                            <source src="${rutaVideo}" type="video/mp4">
                            Tu navegador no soporta vídeos.
                        </video>`;
                    } else {
                        let imagenSrc = noticia.imagen && noticia.imagen.trim() !== "" 
                            ? noticia.imagen 
                            : 'https://placehold.co/600x400/e2e8f0/64748b?text=Leroy+Merlin';
                            
                        if (!imagenSrc.startsWith('http') && !imagenSrc.includes('.')) {
                            imagenSrc = CARPETA_ASSETS + imagenSrc + '.jpg';
                        }

                        htmlMultimedia = `<img src="${imagenSrc}" alt="${noticia.titulo}" loading="lazy" decoding="async" onerror="this.onerror=null; this.src='https://placehold.co/600x400/e2e8f0/64748b?text=Subiendo+Imagen...'">`;
                    }

                    tarjetasNoticias += `
                    <article class="tarjeta
