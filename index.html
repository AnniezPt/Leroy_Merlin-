<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletín Noticias - Leroy Merlin</title>
    <!-- Importamos Tailwind CSS para el diseño profesional y responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lm-green': '#6cc24a',
                        'lm-dark': '#5aa33e',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Efecto al pasar el ratón por encima de la noticia */
        .tarjeta-noticia {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tarjeta-noticia:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.15);
        }
        /* ESTO EVITA QUE LAS IMÁGENES SEAN GIGANTES */
        .contenedor-imagen {
            width: 100%;
            height: 220px; /* Altura fija para todas las fotos */
            overflow: hidden;
            background-color: #e2e8f0;
        }
        .contenedor-imagen img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Recorta la foto proporcionalmente para que encaje perfecto */
        }
        /* Estilo del reproductor de audio */
        audio {
            width: 100%;
            height: 45px;
            border-radius: 8px;
            outline: none;
        }
        /* Aseguramos que los textos mantengan el mismo tamaño (máximo 5 líneas) */
        .line-clamp-5 {
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-12">

    <!-- CABECERA PRINCIPAL FIJA -->
    <header class="bg-white border-b-4 border-lm-green sticky top-0 z-50 shadow-sm px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Boletín Noticias</h1>
                <p class="text-sm text-gray-500 font-medium">Leroy Merlin</p>
            </div>
            <div class="flex gap-3">
                <button class="border border-lm-green text-lm-dark font-semibold px-5 py-1.5 rounded-full text-sm hover:bg-green-50 transition-colors focus:outline-none">Categorías</button>
                <button class="border border-lm-green text-lm-dark font-semibold px-5 py-1.5 rounded-full text-sm hover:bg-green-50 transition-colors focus:outline-none">Fechas</button>
            </div>
        </div>
    </header>

    <!-- AQUÍ APARECERÁN LAS NOTICIAS AUTOMÁTICAMENTE -->
    <main id="contenedor-boletines" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- El motor de abajo dibujará aquí las noticias -->
    </main>

    <!-- ========================================================================= -->
    <!-- ZONA DE INFORMACIÓN: TÚ SOLO EDITAS ESTA PARTE PARA SUBIR NOTICIAS        -->
    <!-- ========================================================================= -->
    <script>
        const EDICIONES_DEL_BOLETIN = [
            
            // ==========================================
            // EDICIÓN 1: LA MÁS NUEVA (Se verá destacada arriba)
            // ==========================================
            {
                tituloAudio: "Resumen de noticias de esta semana",
                audioSrc: "tu-audio-nuevo.mp3", 
                noticias: [
                    {
                        categoria: "Modelos Fundacionales",
                        fecha: "Febrero 2026",
                        titulo: "La Consolidación de DeepSeek-V3.2 y el Paradigma del 'Test-Time Compute'",
                        resumen: "DeepSeek democratiza el cálculo en tiempo de inferencia con el lanzamiento del modelo V3.2. Esta versión reduce drásticamente los costes, iguala el rendimiento de modelos premium e introduce la capacidad autónoma para razonar sobre problemas complejos de matemáticas y programación antes de emitir una respuesta, alterando el mercado actual.",
                        imagen: "", 
                        enlace: "https://api-docs.deepseek.com/news/news251201" 
                    },
                    {
                        categoria: "Generación de Vídeo",
                        fecha: "Febrero 2026",
                        titulo: "OpenAI Lanza Sora 2 y choca con la 'EU AI Act'",
                        resumen: "OpenAI presenta Sora 2, un simulador de mundos físicos con nuevas capacidades como la continuación infinita de vídeos ('Extensions') y la animación de imágenes reales.[3] Sin embargo, la herramienta no está disponible en España debido a las regulaciones de la EU AI Act.[4] La normativa exige estrictos controles de seguridad que la compañía aún está evaluando.",
                        imagen: "", 
                        enlace: "https://openai.com/index/sora-2/" 
                    },
                    {
                        categoria: "Síntesis de Información",
                        fecha: "Febrero 2026",
                        titulo: "NotebookLM redefine la asimilación de conocimiento mediante 'Audio Overviews' Globales",
                        resumen: "Google Labs actualiza NotebookLM añadiendo soporte para más de 50 idiomas en su función de resúmenes 'Audio Overviews'.[7] Esto permite procesar bibliotecas enteras de documentos complejos y convertirlos en discusiones de podcast multilingües, facilitando el aprendizaje cruzando barreras idiomáticas a una velocidad sin precedentes.",
                        imagen: "", 
                        enlace: "https://blog.google/innovation-and-ai/products/notebooklm-audio-overviews/" 
                    }
                ]
            },

            // ==========================================
            // EDICIÓN 2: SEMANA PASADA (Aparecerá abajo, separada y más clarita)
            // ==========================================
            {
                tituloAudio: "Resumen de noticias (Semana Pasada)",
                audioSrc: "audio-antiguo.mp3", 
                noticias: [
                    {
                        categoria: "Logística",
                        fecha: "20 feb 2026",
                        titulo: "Mejoras en la cadena de suministro",
                        resumen: "Se han implementado nuevos sistemas de rastreo satelital que mejoran la eficiencia de entrega en un 15% a nivel europeo.",
                        imagen: "https://placehold.co/600x400/e2e8f0/64748b?text=Imagen+Antigua+1",
                        enlace: "#" 
                    },
                    {
                        categoria: "Retail",
                        fecha: "20 feb 2026",
                        titulo: "Nuevas tiendas con formato híbrido",
                        resumen: "Apertura de nuevos espacios que combinan la experiencia de compra tradicional con puntos de recogida automatizados.",
                        imagen: "https://placehold.co/600x400/e2e8f0/64748b?text=Imagen+Antigua+2",
                        enlace: "#"
                    },
                    {
                        categoria: "Tendencias",
                        fecha: "20 feb 2026",
                        titulo: "Sostenibilidad en materiales de construcción",
                        resumen: "El aumento en la demanda de materiales ecológicos impulsa cambios en el inventario para el próximo trimestre.",
                        imagen: "https://placehold.co/600x400/e2e8f0/64748b?text=Imagen+Antigua+3",
                        enlace: "#"
                    }
                ]
            }

        ];


        // =========================================================================
        // MOTOR DE LA PÁGINA (ESTO CONSTRUYE EL DISEÑO AUTOMÁTICAMENTE - NO TOCAR)
        // =========================================================================
        const contenedor = document.getElementById('contenedor-boletines');
        let htmlFinal = '';

        EDICIONES_DEL_BOLETIN.forEach((edicion, index) => {
            const esLaMasNueva = index === 0;
            const opacidad = esLaMasNueva ? '' : 'opacity-75';

            // Dibujar el separador antes de las ediciones antiguas
            if (!esLaMasNueva && index === 1) {
                htmlFinal += `
                <div class="flex items-center justify-center mt-20 mb-14 opacity-60">
                    <div class="h-[2px] bg-gray-300 w-full rounded-full"></div>
                    <span class="px-5 text-gray-500 text-sm font-bold uppercase tracking-widest whitespace-nowrap bg-[#f4f6f8]">
                        Ediciones Anteriores
                    </span>
                    <div class="h-[2px] bg-gray-300 w-full rounded-full"></div>
                </div>`;
            }

            // Crear las tarjetas de la edición actual
            let tarjetasNoticias = '';
            edicion.noticias.forEach(noticia => {
                // this.onerror=null evita el bucle infinito si la imagen de repuesto también falla
                tarjetasNoticias += `
                <article class="tarjeta-noticia bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                    <div class="contenedor-imagen ${esLaMasNueva ? '' : 'opacity-90'}">
                        <img src="${noticia.imagen}" alt="${noticia.titulo}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/e2e8f0/64748b?text=Imagen+No+Encontrada'">
                    </div>
                    <div class="p-7 flex flex-col flex-grow">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-gray-100 text-gray-600 text-xs font-bold px-2.5 py-1 rounded uppercase tracking-wide">${noticia.categoria}</span>
                            <span class="text-gray-400 text-xs font-medium">${noticia.fecha}</span>
                        </div>
                        <h3 class="font-bold text-2xl mb-4 leading-tight text-gray-900">${noticia.titulo}</h3>
                        <p class="text-gray-600 text-sm mb-6 flex-grow line-clamp-5 leading-relaxed">${noticia.resumen}</p>
                        
                        <!-- ESTE ES EL BOTÓN QUE LEE TU ENLACE -->
                        <a href="${noticia.enlace}" target="_blank" class="text-sm font-bold text-gray-800 hover:text-lm-green transition-colors mt-auto inline-flex items-center group">
                            Leer informe completo 
                            <svg class="w-4 h-4 ml-1.5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </article>`;
            });

            // Ensamblar el bloque de la edición (Audio + Tarjetas)
            htmlFinal += `
            <section class="mb-16 ${opacidad}">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-10 w-full max-w-4xl mx-auto">
                    <h2 class="text-center font-bold ${esLaMasNueva ? 'text-xl text-gray-900' : 'text-lg text-gray-500'} mb-5">${edicion.tituloAudio}</h2>
                    <audio controls class="w-full audio-boletin bg-gray-50 rounded-lg">
                        <source src="${edicion.audioSrc}" type="audio/mpeg">
                        Tu navegador no soporta el audio.
                    </audio>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    ${tarjetasNoticias}
                </div>
            </section>`;
        });

        contenedor.innerHTML = htmlFinal;

        // SISTEMA PARA PAUSAR AUDIOS: Si le das al play a uno, los demás se callan.
        document.addEventListener('play', function(e){
            var audios = document.getElementsByTagName('audio');
            for(var i = 0, len = audios.length; i < len;i++){
                if(audios[i] != e.target){
                    audios[i].pause();
                }
            }
        }, true);
    </script>
</body>
</html>
