<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletín Noticias - Leroy Merlin</title>
    <!-- Importamos Tailwind CSS para el diseño profesional y responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lm-green': '#6cc24a',
                        'lm-dark': '#5aa33e',
                    }
                }
            }
        }

    <style>
        body {
            background-color: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Efecto al pasar el ratón por encima de la noticia */
        .tarjeta-noticia {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .tarjeta-noticia:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.15);
        }
        /* ESTO EVITA QUE LAS IMÁGENES SEAN GIGANTES */
        .contenedor-imagen {
            width: 100%;
            height: 220px; /* Altura fija para todas las fotos */
            overflow: hidden;
            background-color: #e2e8f0;
        }
        .contenedor-imagen img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Recorta la foto proporcionalmente para que encaje perfecto */
        }
        /* Estilo del reproductor de audio */
        audio {
            width: 100%;
            height: 45px;
            border-radius: 8px;
            outline: none;
        }
        /* Aseguramos que los textos mantengan el mismo tamaño (máximo 4 líneas) */
        .line-clamp-4 {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

            <div class="flex gap-3">
